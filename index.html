<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jean-Victor Garnier — Mentorat &amp; partage d'expérience pour entrepreneurs</title>
  <meta name="description" content="Jean-Victor Garnier accompagne les dirigeant·e·s de PME et start-up de la tech et des services aux entreprises. Un mentorat nourri par 15 ans à la tête d'une ESN passée de 1 à 350 collaborateurs, dans un esprit de partage d'expérience." />
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <!-- ====================== HEADER / NAV ====================== -->
  <header class="site-header" id="top">
    <div class="container header-inner">
      <a href="#top" class="brand" aria-label="Jean-Victor Garnier — accueil">
        <span class="brand-mark" id="brand-mark"></span>
        <span class="brand-name" id="brand-name"></span>
      </a>

      <nav class="nav" aria-label="Navigation principale">
        <button class="nav-toggle" aria-expanded="false" aria-controls="nav-menu" aria-label="Ouvrir le menu">
          <span></span><span></span><span></span>
        </button>
        <ul class="nav-menu" id="nav-menu">
          <li><a href="#mentor">Le mentor</a></li>
          <li><a href="#parcours">Parcours</a></li>
          <li><a href="#pour-qui">Pour qui</a></li>
          <li><a href="#domaines">Domaines</a></li>
          <li><a href="#ecosysteme">Écosystème</a></li>
          <li><a href="#temoignages">Témoignages</a></li>
          <li><a href="#contact" class="nav-cta">Réserver un échange</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main>

    <!-- ====================== HERO ====================== -->
    <section class="hero" id="hero">
      <div class="hero-glow" aria-hidden="true"></div>
      <div class="container hero-inner">
        <p class="eyebrow reveal" id="hero-eyebrow"></p>
        <h1 class="hero-title reveal" id="hero-title"></h1>
        <p class="hero-lead reveal" id="hero-lead"></p>
        <div class="hero-actions reveal">
          <a href="#contact" class="btn btn-primary" id="hero-cta-primary"></a>
          <a href="#parcours" class="btn btn-ghost" id="hero-cta-ghost"></a>
        </div>

        <ul class="hero-stats reveal" id="hero-stats" aria-label="Chiffres clés du parcours"></ul>
      </div>
    </section>

    <!-- ====================== LE MENTOR ====================== -->
    <section class="section" id="mentor">
      <div class="container mentor-grid">
        <div class="mentor-portrait reveal">
          <img id="mentor-img" src="assets/jean-victor.jpg" alt="Portrait de Jean-Victor Garnier"
               width="1354" height="2030"
               onerror="this.onerror=null;this.src='assets/portrait-placeholder.svg';" />
        </div>
        <div class="mentor-text">
          <p class="eyebrow reveal" id="mentor-eyebrow"></p>
          <h2 class="reveal" id="mentor-title"></h2>
          <div id="mentor-paragraphs"></div>
          <a href="#contact" class="btn btn-primary reveal" id="mentor-cta"></a>
        </div>
      </div>
    </section>

    <!-- ====================== PARCOURS ====================== -->
    <section class="section section-dark" id="parcours">
      <div class="container">
        <div class="section-head">
          <p class="eyebrow reveal" id="parcours-eyebrow"></p>
          <h2 class="reveal" id="parcours-title"></h2>
        </div>

        <div class="stat-band reveal" id="parcours-stats" aria-label="Chiffres clés"></div>

        <div class="facets-grid" id="parcours-facets"></div>
      </div>
    </section>

    <!-- ====================== POUR QUI ====================== -->
    <section class="section" id="pour-qui">
      <div class="container">
        <div class="section-head">
          <p class="eyebrow reveal" id="pourqui-eyebrow"></p>
          <h2 class="reveal" id="pourqui-title"></h2>
        </div>

        <div class="audience-grid" id="pourqui-cards"></div>
      </div>
    </section>

    <!-- ====================== DOMAINES DE COACHING ====================== -->
    <section class="section section-soft" id="domaines">
      <div class="container">
        <div class="section-head">
          <p class="eyebrow reveal" id="domaines-eyebrow"></p>
          <h2 class="reveal" id="domaines-title"></h2>
          <p class="section-intro reveal" id="domaines-intro"></p>
        </div>

        <div class="domains-grid" id="domaines-cards"></div>
      </div>
    </section>

    <!-- ====================== ÉCOSYSTÈME ====================== -->
    <section class="section section-dark" id="ecosysteme">
      <div class="container">
        <div class="section-head">
          <p class="eyebrow reveal" id="eco-eyebrow"></p>
          <h2 class="reveal" id="eco-title"></h2>
          <p class="section-intro reveal" id="eco-intro"></p>
        </div>

        <div class="eco-grid" id="eco-tags"></div>

        <p class="eco-note reveal" id="eco-note"></p>
      </div>
    </section>

    <!-- ====================== TÉMOIGNAGES ====================== -->
    <section class="section section-soft" id="temoignages">
      <div class="container">
        <div class="section-head">
          <p class="eyebrow reveal" id="temoignages-eyebrow"></p>
          <h2 class="reveal" id="temoignages-title"></h2>
          <p class="section-intro reveal" id="temoignages-intro"></p>
        </div>

        <div class="testimonials-grid" id="temoignages-items"></div>
      </div>
    </section>

    <!-- ====================== CONTACT ====================== -->
    <section class="section" id="contact">
      <div class="container contact-grid">
        <div class="contact-text">
          <p class="eyebrow reveal" id="contact-eyebrow"></p>
          <h2 class="reveal" id="contact-title"></h2>
          <p class="reveal" id="contact-text"></p>

          <div class="booking-placeholder reveal" id="booking">
            <p class="booking-title" id="booking-title"></p>
            <p class="booking-desc" id="booking-desc"></p>
            <div class="booking-embed" id="booking-embed"></div>
          </div>

          <ul class="contact-coords reveal">
            <li><span>Email</span><a id="contact-email" href="mailto:contact@example.com"></a></li>
            <li><span>LinkedIn</span><a id="contact-linkedin" href="#"></a></li>
          </ul>
        </div>

        <form class='contact-form reveal' id='contact-form' method='POST' name='contact' novalidate>
          <input type="hidden" name="form-name" value="contact" />
          <p class="hp-field" aria-hidden="true">
            <label>Ne pas remplir : <input name="bot-field" tabindex="-1" autocomplete="off" /></label>
          </p>
          <div class="field">
            <label for="name">Nom complet</label>
            <input type="text" id="name" name="name" autocomplete="name" required />
          </div>
          <div class="field">
            <label for="company">Entreprise</label>
            <input type="text" id="company" name="company" autocomplete="organization" />
          </div>
          <div class="field">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" autocomplete="email" required />
          </div>
          <div class="field">
            <label for="message">Votre projet, en quelques mots</label>
            <textarea id="message" name="message" rows="4" required></textarea>
          </div>
          <button type="submit" class="btn btn-primary btn-block">Envoyer ma demande</button>
          <p class="form-feedback" id="form-feedback" role="status" aria-live="polite"></p>
        </form>
      </div>
    </section>

  </main>

  <!-- ====================== FOOTER ====================== -->
  <footer class="site-footer">
    <div class="container footer-inner">
      <div class="footer-brand">
        <span class="brand-mark" id="footer-mark"></span>
        <p id="footer-tagline"></p>
      </div>
      <nav class="footer-nav" aria-label="Pied de page">
        <a href="#mentor">Le mentor</a>
        <a href="#parcours">Parcours</a>
        <a href="#domaines">Domaines</a>
        <a href="#ecosysteme">Écosystème</a>
        <a href="#temoignages">Témoignages</a>
        <a href="#contact">Contact</a>
      </nav>
      <p class="footer-legal">© <span id="year"></span> Jean-Victor Garnier. Tous droits réservés.</p>
    </div>
  </footer>

  <script src="js/main.js"></script>
  <script src="js/render.js"></script>
</body>
</html>
