    <!-- ====================== CONTACT ====================== -->
    <section class="section" id="contact">
      <div class="container">
        <div class="section-head">

          <h2 class="reveal" id="contact-title"></h2>
          <p class="section-intro reveal" id="contact-text"></p>
        </div>

        <div class="contact-layout">
          <div class="booking-placeholder reveal" id="booking">
            <p class="booking-title" id="booking-title"></p>
            <p class="booking-desc" id="booking-desc"></p>
            <div class="booking-embed" id="booking-embed"></div>
          </div>

          <form class='contact-form reveal' id='contact-form' method='POST' name='contact' data-netlify='true' netlify-honeypot='bot-field' novalidate>
          <input type="hidden" name="access_key" value="22e6da7b-297a-4c79-99e0-fdbfe90011fe" />
          <input type="hidden" name="subject" value="Nouvelle demande de contact — JVG" />
          <p class="hp-field" aria-hidden="true">
            <label>Ne pas remplir : <input name="bot-field" tabindex="-1" autocomplete="off" /></label>
          </p>
          <div class="field">
            <label for="name" id="label-name">Nom complet</label>
            <input type="text" id="name" name="name" autocomplete="name" required />
          </div>
          <div class="field">
            <label for="company" id="label-company">Entreprise</label>
            <input type="text" id="company" name="company" autocomplete="organization" />
          </div>
          <div class="field">
            <label for="email" id="label-email">Email</label>
            <input type="email" id="email" name="email" autocomplete="email" required />
          </div>
          <div class="field">
            <label for="message" id="label-message">Votre projet, en quelques mots</label>
            <textarea id="message" name="message" rows="4" required></textarea>
          </div>
          <button type="submit" class="btn btn-primary btn-block" id="form-submit">Envoyer ma demande</button>
          <p class="form-feedback" id="form-feedback" role="status" aria-live="polite"></p>
        </form>
        </div>
      </div>
