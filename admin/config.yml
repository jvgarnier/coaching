# Authentification via DecapBridge (PKCE) — remplace Netlify Identity (déprécié).
backend:
  name: git-gateway
  repo: jvgarnier/coaching
  branch: main
  auth_type: pkce
  base_url: https://auth.decapbridge.com
  auth_endpoint: /sites/d4150dc3-f1c8-49a3-af2f-e4425e9bf24e/pkce
  auth_token_endpoint: /sites/d4150dc3-f1c8-49a3-af2f-e4425e9bf24e/token
  gateway_url: https://gateway.decapbridge.com
  commit_messages:
    create: 'Create {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge'
    update: 'Update {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge'
    delete: 'Delete {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge'
    uploadMedia: 'Upload "{{path}}" - {{author-name}} <{{author-login}}> via DecapBridge'
    deleteMedia: 'Delete "{{path}}" - {{author-name}} <{{author-login}}> via DecapBridge'
    openAuthoring: 'Message {{message}} - {{author-name}} <{{author-login}}> via DecapBridge'

# Champs renvoyés par DecapBridge sur l'utilisateur connecté.
auth:
  email_claim: email
  first_name_claim: first_name
  last_name_claim: last_name
  avatar_url_claim: avatar_url

logo_url: https://decapbridge.com/decapcms-with-bridge.svg
site_url: https://jvgarnier.com

# Permet de tester l'admin en local avec `npx decap-server` (voir README).
local_backend: true

media_folder: "assets/uploads"
public_folder: "/assets/uploads"

locale: "fr"

collections:
  - name: "site"
    label: "Contenu du site"
    files:
      - name: "accueil"
        label: "Page d'accueil"
        file: "content/site.json"
        editor:
          preview: false
        fields:
          - label: "SEO (titre & description)"
            name: "meta"
            widget: "object"
            fields:
              - { label: "Titre de la page", name: "title", widget: "string" }
              - { label: "Description (meta)", name: "description", widget: "text" }

          - label: "Marque"
            name: "brand"
            widget: "object"
            fields:
              - { label: "Sigle (ex. JVG)", name: "mark", widget: "string" }
              - { label: "Nom complet", name: "name", widget: "string" }

          - label: "Navigation (en-tête)"
            name: "nav"
            widget: "object"
            fields:
              - { label: "Bouton d'action (ex. Réserver un échange)", name: "cta", widget: "string" }
              - label: "Liens du menu"
                name: "items"
                widget: "list"
                fields:
                  - { label: "Libellé", name: "label", widget: "string" }
                  - { label: "Lien (ancre, ex. #mentor)", name: "href", widget: "string" }

          - label: "Hero (haut de page)"
            name: "hero"
            widget: "object"
            fields:
              - { label: "Sur-titre", name: "eyebrow", widget: "string" }
              - { label: "Titre", name: "title", widget: "text" }
              - { label: "Texte d'accroche", name: "lead", widget: "text" }
              - label: "Bouton principal"
                name: "ctaPrimary"
                widget: "object"
                fields:
                  - { label: "Libellé", name: "label", widget: "string" }
                  - { label: "Lien", name: "href", widget: "string" }
              - label: "Bouton secondaire"
                name: "ctaGhost"
                widget: "object"
                fields:
                  - { label: "Libellé", name: "label", widget: "string" }
                  - { label: "Lien", name: "href", widget: "string" }
              - label: "Chiffres clés"
                name: "stats"
                widget: "list"
                fields:
                  - { label: "Valeur", name: "value", widget: "string" }
                  - { label: "Légende", name: "label", widget: "string" }

          - label: "Le mentor"
            name: "mentor"
            widget: "object"
            fields:
              - { label: "Sur-titre", name: "eyebrow", widget: "string" }
              - { label: "Titre", name: "title", widget: "text" }
              - { label: "Photo", name: "image", widget: "image" }
              - { label: "Texte alternatif de la photo", name: "imageAlt", widget: "string", required: false }
              - label: "Paragraphes"
                name: "paragraphs"
                widget: "list"
                field: { label: "Paragraphe", name: "paragraph", widget: "text" }
              - label: "Bouton"
                name: "cta"
                widget: "object"
                fields:
                  - { label: "Libellé", name: "label", widget: "string" }
                  - { label: "Lien", name: "href", widget: "string" }

          - label: "Parcours"
            name: "parcours"
            widget: "object"
            fields:
              - { label: "Sur-titre", name: "eyebrow", widget: "string" }
              - { label: "Titre", name: "title", widget: "text" }
              - label: "Chiffres clés"
                name: "stats"
                widget: "list"
                fields:
                  - { label: "Valeur", name: "value", widget: "string" }
                  - { label: "Légende", name: "label", widget: "string" }
              - label: "Étapes"
                name: "facets"
                widget: "list"
                fields:
                  - { label: "Numéro", name: "num", widget: "string" }
                  - { label: "Titre", name: "title", widget: "string" }
                  - { label: "Texte", name: "text", widget: "text" }

          - label: "Pour qui ?"
            name: "pourQui"
            widget: "object"
            fields:
              - { label: "Sur-titre", name: "eyebrow", widget: "string" }
              - { label: "Titre", name: "title", widget: "text" }
              - label: "Cartes"
                name: "cards"
                widget: "list"
                fields:
                  - { label: "Titre", name: "title", widget: "string" }
                  - { label: "Texte", name: "text", widget: "text" }

          - label: "Domaines de coaching"
            name: "domaines"
            widget: "object"
            fields:
              - { label: "Sur-titre", name: "eyebrow", widget: "string" }
              - { label: "Titre", name: "title", widget: "text" }
              - { label: "Introduction", name: "intro", widget: "text" }
              - label: "Cartes"
                name: "cards"
                widget: "list"
                fields:
                  - { label: "Titre", name: "title", widget: "string" }
                  - label: "Éléments de la liste"
                    name: "items"
                    widget: "list"
                    field: { label: "Élément", name: "item", widget: "string" }

          - label: "Écosystème"
            name: "ecosysteme"
            widget: "object"
            fields:
              - { label: "Sur-titre", name: "eyebrow", widget: "string" }
              - { label: "Titre", name: "title", widget: "text" }
              - { label: "Introduction", name: "intro", widget: "text" }
              - label: "Étiquettes"
                name: "tags"
                widget: "list"
                field: { label: "Étiquette", name: "tag", widget: "string" }
              - { label: "Note de bas de section", name: "note", widget: "text" }

          - label: "Témoignages"
            name: "temoignages"
            widget: "object"
            fields:
              - { label: "Sur-titre", name: "eyebrow", widget: "string" }
              - { label: "Titre", name: "title", widget: "text" }
              - { label: "Introduction", name: "intro", widget: "text" }
              - label: "Témoignages"
                name: "items"
                widget: "list"
                fields:
                  - { label: "Citation", name: "quote", widget: "text" }
                  - { label: "Nom", name: "name", widget: "string" }
                  - { label: "Fonction · Entreprise", name: "role", widget: "string" }

          - label: "Contact"
            name: "contact"
            widget: "object"
            fields:
              - { label: "Sur-titre", name: "eyebrow", widget: "string" }
              - { label: "Titre", name: "title", widget: "text" }
              - { label: "Texte", name: "text", widget: "text" }
              - label: "Encart prise de rendez-vous"
                name: "booking"
                widget: "object"
                fields:
                  - { label: "Titre", name: "title", widget: "string" }
                  - { label: "Description", name: "desc", widget: "text" }
                  - { label: "Lien d'intégration de l'agenda Google", name: "calendarUrl", widget: "string" }
              - label: "Formulaire de contact"
                name: "form"
                widget: "object"
                fields:
                  - { label: "Label champ Nom", name: "labelName", widget: "string" }
                  - { label: "Label champ Entreprise", name: "labelCompany", widget: "string" }
                  - { label: "Label champ Email", name: "labelEmail", widget: "string" }
                  - { label: "Label champ Message", name: "labelMessage", widget: "string" }
                  - { label: "Texte du bouton d'envoi", name: "submit", widget: "string" }
                  - { label: "Message — envoi en cours", name: "msgSending", widget: "string" }
                  - { label: "Message — succès", name: "msgSuccess", widget: "text" }
                  - { label: "Message — champs manquants", name: "msgErrorRequired", widget: "string" }
                  - { label: "Message — email invalide", name: "msgErrorEmail", widget: "string" }
                  - { label: "Message — repli messagerie", name: "msgFallback", widget: "string" }

          - label: "Pied de page"
            name: "footer"
            widget: "object"
            fields:
              - { label: "Phrase de pied de page", name: "tagline", widget: "text" }
              - { label: "Texte du copyright (après ©)", name: "copyright", widget: "string" }
              - label: "Liens de navigation du pied de page"
                name: "nav"
                widget: "list"
                fields:
                  - { label: "Libellé", name: "label", widget: "string" }
                  - { label: "Lien (ancre, ex. #mentor)", name: "href", widget: "string" }
